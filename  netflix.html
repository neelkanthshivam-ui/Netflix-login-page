<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: #b80909;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            text-align: center;
        }

        .login-box {
            background-color: #222;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #e50914;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #f40612;
        }

        .help {
            margin-top: 10px;
            color: #999;
        }
    </style>

<div class="login-container">
    <h1>NETFLIX</h1>

    <div class="login-box">
        <h2>Sign In</h2>

        <input type="text" id="email" placeholder="Email or phone number">
        <input type="password" id="password" placeholder="Password">

        <button onclick="loginUser()">Sign In</button>

        <p class="help">Need help?</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
